# OpenManus-Lite configuration (example — copy to config.toml and edit,
# or just run `python main.py` and the setup wizard writes it for you).)
[llm]
base_url = "https://api.openai.com/v1"
api_key = "sk-..."
model = "gpt-4o"
max_tokens = 4096
temperature = 0.0
api_type = "openai"

[sandbox]
use_sandbox = false
timeout = 300

# Optional durable memory / state storage.
# type: "memory" (default, ephemeral, no setup) | "sqlite" (file, stdlib) | <custom>
# Users can add their own backend (Postgres, Redis, vector DB, file tree, etc.)
# by subclassing StoreBackend in app/store.py and registering it in STORE_BACKENDS.
[store]
type = "memory"
# options for the chosen backend, e.g. for sqlite: { path = "memory.db" }
